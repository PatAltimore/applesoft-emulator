<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Applesoft Network Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="runtime/local-emulator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="masthead">
      <div>
        <p class="eyebrow">1983 REMOTE COMPUTER CLUB</p>
        <h1>APPLE ][ NETWORK TERMINAL</h1>
      </div>
      <div class="status-lights" aria-label="System status">
        <span class="light light-red"></span>
        <span class="light light-amber"></span>
        <span class="light light-green"></span>
      </div>
    </header>

    <main class="console-layout">
      <aside class="control-panel panel">
        <section>
          <h2>System</h2>
          <dl class="telemetry">
            <div>
              <dt>Link</dt>
              <dd id="api-status">Checking...</dd>
            </div>
            <div>
              <dt>Session</dt>
              <dd id="session-id">OFFLINE</dd>
            </div>
            <div>
              <dt>Backend</dt>
              <dd id="api-base-url" class="tiny"></dd>
            </div>
          </dl>
        </section>



        <section>
          <h2>Power</h2>
          <div class="button-grid">
            <button type="button" id="new-session">NEW SESSION</button>
            <button type="button" id="reset-session">RESET</button>
            <button type="button" id="clear-screen">CLEAR CRT</button>
          </div>
        </section>

        <section>
          <h2>History</h2>
          <div class="button-grid">
            <button type="button" id="clear-history">CLEAR HISTORY</button>
          </div>
          <ul id="history-list" class="list-pane" aria-label="Command history"></ul>
        </section>
      </aside>

      <section class="crt panel" aria-label="Applesoft terminal">
        <div class="crt-bezel">
          <div class="crt-screen">
            <pre id="output" class="output" aria-live="polite"></pre>
            <form id="command-form" class="command-bar">
              <div id="runtime-hint" class="runtime-hint" role="status" aria-live="polite"></div>
              <label class="prompt" for="command-input">]</label>
              <textarea id="command-input" rows="2" spellcheck="false" placeholder='10 PRINT "HELLO"'></textarea>
              <button type="submit">SEND</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
