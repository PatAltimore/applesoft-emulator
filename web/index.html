<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Applesoft BASIC Interpreter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="runtime/local-emulator.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="masthead">
      <div>
        <p class="eyebrow">APPLE ][ COMPUTER</p>
        <h1>APPLESOFT BASIC INTERPRETER</h1>
      </div>
      <div class="status-lights" aria-label="System status">
        <span class="light light-red"></span>
        <span class="light light-amber"></span>
        <span class="light light-green"></span>
      </div>
    </header>

    <main class="console-layout">
      <section class="crt panel" aria-label="Applesoft terminal">
        <div class="crt-bezel">
          <div class="crt-screen">
            <pre id="output" class="output" aria-live="polite"></pre>
            <form id="command-form" class="command-bar">
              <div id="runtime-hint" class="runtime-hint" role="status" aria-live="polite"></div>
              <label class="prompt" for="command-input">]</label>
              <textarea id="command-input" rows="2" spellcheck="false"></textarea>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
